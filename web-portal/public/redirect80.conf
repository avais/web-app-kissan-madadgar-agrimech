# ---------------------------------------------------
# HTTP server (needed for Let's Encrypt verification)
# ---------------------------------------------------
server {
    listen 80;
    server_name gop.zepl.com.pk;

    root /var/www/gop_zepl/html;

    # Allow Certbot challenge
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------
# HTTPS server
# ---------------------------------------------------
server {
    listen 443 ssl http2;
    server_name gop.zepl.com.pk;

    # SSL certs from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/gop.zepl.com.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gop.zepl.com.pk/privkey.pem;

    # SSL Configuration (safe & modern)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Serve Angular app
    root /var/www/gop_zepl/html;
    index index.html;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8097;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
# Redirect all HTTP traffic to HTTPS for kissanmadadgar.agrimech.gop.pk
server {
    listen 80;
    server_name kissanmadadgar.agrimech.gop.pk;
    return 301 https://$host$request_uri;
}

# HTTPS server for kissanmadadgar.agrimech.gop.pk
server {
    listen 443 ssl http2;
    server_name kissanmadadgar.agrimech.gop.pk;

    ssl_certificate /etc/letsencrypt/live/kissanmadadgar.agrimech.gop.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kissanmadadgar.agrimech.gop.pk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # FRONTEND (Angular build)
    root /var/www/kissanmadadgar/html;
    index index.html;

    # BACKEND API (Spring Boot)
    location /api/ {
        proxy_pass http://127.0.0.1:8089/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # FRONTEND ROUTING (Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

