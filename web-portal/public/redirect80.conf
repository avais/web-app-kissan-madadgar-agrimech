# Complete nginx configuration for all domains
# Copy this entire file to /etc/nginx/sites-available/zepl-agrimech
# Then create symlink: ln -sf /etc/nginx/sites-available/zepl-agrimech /etc/nginx/sites-enabled/

# Redirect all HTTP traffic to HTTPS for zepl.com.pk
server {
    listen 80;
    server_name zepl.com.pk www.zepl.com.pk;
    return 301 https://$host$request_uri;
}

# HTTPS server for zepl.com.pk
server {
    listen 443 ssl;
    server_name zepl.com.pk www.zepl.com.pk;

    # SSL certs from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/zepl.com.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zepl.com.pk/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Serve Angular app
    root /var/www/erp_accounts_portal/html;
    index index.html;

    # Proxy specific API endpoint to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Redirect all HTTP traffic to HTTPS for dhamargalla.zepl.com.pk
server {
    listen 80;
    server_name dhamargalla.zepl.com.pk;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/dhamargalla/html;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

